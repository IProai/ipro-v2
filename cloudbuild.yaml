# ═══════════════════════════════════════════════════════════════════════════════
# IProCore — Cloud Build
#
# Builds and pushes all three service images to Artifact Registry.
# Does NOT run migrations — migrations are a Cloud Run Job (deploy/iprocore-migrate.job.yaml).
# Does NOT deploy services — deployment is via `gcloud run services replace`.
#
# Trigger: git push to main (configure in Cloud Build console)
# Manual:  gcloud builds submit --config=cloudbuild.yaml .
# ═══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: me-central1
  _PROJECT: iprocore
  _REGISTRY: me-central1-docker.pkg.dev/iprocore/ipro-registry

steps:
  # ─── API Service ──────────────────────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_REGISTRY/iprocore-api:$COMMIT_SHA
      - --tag=$_REGISTRY/iprocore-api:latest
      # Inject git SHA for health endpoint build info
      - --build-arg=GIT_SHA=$COMMIT_SHA
      - --file=ipro-backbone/services/iprocore-api/Dockerfile
      # Build context is the service directory (matches COPY paths in Dockerfile)
      - ipro-backbone/services/iprocore-api
    waitFor: ["-"]  # start immediately

  # ─── Web Frontend ─────────────────────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_REGISTRY/iprocore-web:$COMMIT_SHA
      - --tag=$_REGISTRY/iprocore-web:latest
      - --file=ipro-backbone/services/iprocore-web/Dockerfile
      - ipro-backbone/services/iprocore-web
    waitFor: ["-"]  # parallel with build-api

  # ─── JAD Runtime ──────────────────────────────────────────────────────────
  - id: build-jad
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_REGISTRY/jad-runtime:$COMMIT_SHA
      - --tag=$_REGISTRY/jad-runtime:latest
      - --file=ipro-backbone/services/jad-runtime/Dockerfile
      - ipro-backbone/services/jad-runtime
    waitFor: ["-"]  # parallel with build-api

# Push all tagged images to Artifact Registry
images:
  - $_REGISTRY/iprocore-api:$COMMIT_SHA
  - $_REGISTRY/iprocore-api:latest
  - $_REGISTRY/iprocore-web:$COMMIT_SHA
  - $_REGISTRY/iprocore-web:latest
  - $_REGISTRY/jad-runtime:$COMMIT_SHA
  - $_REGISTRY/jad-runtime:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
